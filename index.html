<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Owlie – JSOM Chatbot</title>
  <style>
    body {
      background: #121212;
      color: #ffffff;
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 2em;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .chatbot-title {
      font-size: 2em;
      margin-bottom: 5px;
    }

    #chat-input-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 16px;
    }

    textarea {
      width: 100%;
      max-width: 600px;
      height: 100px;
      padding: 10px;
      border-radius: 8px;
      font-size: 1em;
      background: #2a2a2a;
      color: #eee;
      border: 1px solid #555;
    }

    button {
      margin-top: 10px;
      padding: 10px 20px;
      font-size: 1em;
      background: #007bff;
      border: none;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    .chatbox {
      max-width: 600px;
      margin-top: 30px;
      background: #1e1e1e;
      padding: 15px;
      border-radius: 10px;
      white-space: pre-wrap;
      border: 1px solid #444;
    }

    .blinking-owl-img {
      width: 80px;
      height: 80px;
      margin-top: 20px;
      display: none;
      animation: blink 1.5s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    #brand-footer {
      text-align: center;
      font-size: 0.9em;
      margin-top: 20px;
      padding-top: 10px;
    }

    #brand-footer a {
      color: #ccc;
      text-decoration: none;
    }
  </style>
</head>

<body>
  <div class="chatbot-title">Owlie</div>

  <div id="chat-input-area">
    <textarea id="userInput" placeholder="Ask me anything about JSOM..."></textarea>
    <button onclick="askOwlie()">Ask</button>
    <img id="owl-blink" class="blinking-owl-img" src="static/animated_owl.gif" alt="Thinking Owl" />
  </div>

  <div class="chatbox" id="chatResponse">Your answer will appear here.</div>

  <div id="brand-footer">
    Powered by <strong>Jindal School of Management</strong> •
    <a href="mailto:jindal@utdallas.edu">Contact us</a>
  </div>

  <script>
    async function askOwlie() {
      const input = document.getElementById("userInput").value.trim();
      const responseBox = document.getElementById("chatResponse");
      const owl = document.getElementById("owl-blink");

      if (!input) return;

      owl.style.display = "inline";
      responseBox.innerText = "Thinking... 🧠";

      try {
        const res = await fetch("https://owlie-backend.onrender.com/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: input })
        });

        const data = await res.json();
        responseBox.innerText = data.reply || "Owlie didn't say anything.";
      } catch (e) {
        responseBox.innerText = "Error reaching Owlie 😢";
      }

      owl.style.display = "none";
    }
  </script>
</body>
</html>
